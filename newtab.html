<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nibble — new tab</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   DESIGN TOKENS
   ═══════════════════════════════════════════════ */
:root {
  --blush:     #FFF8FA;
  --pink:      #FFB6C1;
  --pink-dark: #FFDDE8;
  --berry:     #C4527A;
  --berry-dark:#7a2040;
  --lavender:  #E8D5F5;
  --lavender-2:#C3A8E8;
  --yellow:    #FFF3CC;
  --yellow-2:  #E2D075;
  --mint:      #D4F5E9;
  --mint-2:    #8ADAB8;
  --peach:     #FFECD2;
  --text-dark: #3d1a28;
  --grid-size: 39px;
}

/* ═══════════════════════════════════════════════
   BASE
   ═══════════════════════════════════════════════ */
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; }

body {
  font-family: 'Press Start 2P', monospace;
  background: var(--blush);
  background-image:
    linear-gradient(rgba(255,182,193,.28) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,182,193,.28) 1px, transparent 1px);
  background-size: var(--grid-size) var(--grid-size);
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;
}

/* ═══════════════════════════════════════════════
   WINDOW CHROME (shared by all widgets)
   ═══════════════════════════════════════════════ */
.win {
  border-radius: 12px;
  overflow: hidden;
}
.titlebar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 9px 13px;
}
.dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
.dot-r { background: #FF6B6B; }
.dot-y { background: #FFD93D; }
.dot-g { background: #6BCB77; }
.win-title { margin-left: 7px; font-size: 7px; letter-spacing: -.2px; }
.bg-body { padding: 12px 14px 14px; }

/* ═══════════════════════════════════════════════
   TWO-COLUMN GRID LAYOUT
   ═══════════════════════════════════════════════ */
#grid {
  display: flex;
  flex-direction: row;
  gap: 36px;
  align-items: flex-start;
  position: relative;
  z-index: 20;
  padding: 20px 0;
}

#left-panel {
  width: 300px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

#right-panel {
  width: 510px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  align-items: center;
}

/* ═══════════════════════════════════════════════
   SEARCH BAR
   ═══════════════════════════════════════════════ */
#win-search {
  background: white;
  border: 2px solid var(--pink);
  border-radius: 999px;
  overflow: hidden;
}
#search-form {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 8px;
  padding: 10px 10px 10px 18px;
}
#search-input {
  flex: 1;
  font-family: 'Press Start 2P', monospace;
  font-size: 7px;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text-dark);
  min-width: 0;
}
#search-input::placeholder { color: #d4a0b5; }
#search-btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 6px;
  background: var(--berry);
  color: white;
  border: none;
  border-radius: 999px;
  padding: 8px 14px;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
}
#search-btn:hover { background: var(--berry-dark); }

/* ═══════════════════════════════════════════════
   SHORTCUTS ROW (Google-style circles)
   ═══════════════════════════════════════════════ */
#shortcuts-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px 6px;
}

.shortcut-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  text-decoration: none;
  cursor: pointer;
  background: none;
  border: none;
  font-family: 'Press Start 2P', monospace;
  padding: 0;
}
.shortcut-circle {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: white;
  border: 2px solid var(--pink);
  box-shadow: 3px 3px 0 var(--pink);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.1s, box-shadow 0.1s;
}
.shortcut-item:hover .shortcut-circle {
  transform: translate(1px, 1px);
  box-shadow: 2px 2px 0 var(--pink);
}
.shortcut-circle img {
  width: 22px;
  height: 22px;
  border-radius: 4px;
}
.shortcut-label {
  font-size: 5px;
  color: var(--text-dark);
  text-align: center;
  max-width: 54px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* "More" circle — lavender */
.shortcut-more .shortcut-circle {
  background: var(--lavender);
  border-color: var(--lavender-2);
  box-shadow: 3px 3px 0 var(--lavender-2);
  font-size: 13px;
  color: #6b3fa0;
  letter-spacing: 1px;
}
.shortcut-more:hover .shortcut-circle { box-shadow: 2px 2px 0 var(--lavender-2); }

/* "Add" circle — yellow */
.shortcut-add .shortcut-circle {
  background: var(--yellow);
  border-color: var(--yellow-2);
  box-shadow: 3px 3px 0 var(--yellow-2);
  font-size: 20px;
  color: #7a6520;
}
.shortcut-add:hover .shortcut-circle { box-shadow: 2px 2px 0 var(--yellow-2); }

/* ═══════════════════════════════════════════════
   TABS.SYS (left panel)
   ═══════════════════════════════════════════════ */
#win-tabs {
  background: #f2fffb;
  border: 2px solid var(--mint-2);
  box-shadow: 4px 4px 0 var(--mint-2);
}
#win-tabs .titlebar { background: var(--mint); }
#win-tabs .win-title { color: #2d7a5a; }

#tabs-list {
  padding: 8px 12px 12px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.tab-item {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 7px 8px;
  text-decoration: none;
  border-radius: 7px;
  cursor: pointer;
}
.tab-item:hover { background: rgba(138, 218, 184, 0.25); }
.tab-favicon {
  width: 14px;
  height: 14px;
  flex-shrink: 0;
  border-radius: 3px;
}
.tab-title {
  font-size: 5.5px;
  color: var(--text-dark);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.tabs-empty {
  font-size: 5.5px;
  color: #2d7a5a;
  text-align: center;
  padding: 10px 0 4px;
}

/* ═══════════════════════════════════════════════
   NIBBLE CARD + COOKIE MASCOT (right panel)
   ═══════════════════════════════════════════════ */
#center {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
}

#cookie-mascot {
  text-align: center;
  margin-bottom: -20px;
  position: relative;
  z-index: 25;
}
#cookie-mascot img {
  width: 80px;
  height: auto;
  filter: drop-shadow(0 4px 10px rgba(196,82,122,.25));
}

#main {
  position: relative;
  width: 510px;
  background: #fff;
  border: 2.5px solid var(--berry);
  box-shadow: 7px 7px 0 var(--berry), 0 28px 80px rgba(196,82,122,.12);
  border-radius: 14px;
  overflow: hidden;
  animation: float 5s ease-in-out infinite;
}
#main .titlebar { background: var(--pink); }
#main .win-title { color: var(--berry-dark); }

.main-body {
  padding: 30px 44px 34px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
}

.author-pill {
  border: 2px solid var(--pink);
  color: var(--berry);
  padding: 9px 26px;
  border-radius: 999px;
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  white-space: nowrap;
}
.author-pill.hidden { display: none; }

.article-date {
  font-size: 9px;
  color: #8a5070;
  letter-spacing: 0.04em;
}
.article-date.hidden { display: none; }

.article-title {
  font-size: 13px;
  color: var(--text-dark);
  text-align: center;
  line-height: 1.85;
}

.article-desc {
  font-size: 7px;
  color: #8a6a74;
  line-height: 2.1;
  text-align: center;
  width: 100%;
  max-width: 370px;
}
.article-desc.hidden { display: none; }

.nibble-btn {
  background: var(--berry);
  color: #fff;
  border: 2.5px solid var(--berry-dark);
  box-shadow: 4px 4px 0 var(--berry-dark);
  padding: 14px 44px;
  border-radius: 999px;
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  letter-spacing: 1px;
  cursor: pointer;
  margin-top: 4px;
  transition: transform .1s, box-shadow .1s;
}
.nibble-btn:hover {
  transform: translate(2px, 2px);
  box-shadow: 2px 2px 0 var(--berry-dark);
}

/* ═══════════════════════════════════════════════
   BLOOMS.SYS (right panel)
   ═══════════════════════════════════════════════ */
#win-blooms {
  width: 100%;
  background: #f2fffb;
  border: 2px solid var(--mint-2);
  box-shadow: 4px 4px 0 var(--mint-2);
}
#win-blooms .titlebar { background: var(--mint); }
#win-blooms .win-title { color: #2d7a5a; }
.blooms-label { font-size: 5.5px; color: #2d7a5a; text-align: center; margin-bottom: 8px; }
.blooms-row { display: flex; justify-content: space-around; align-items: center; }

/* ═══════════════════════════════════════════════
   TOO_MANY_NIBBLES.EXE (right panel)
   ═══════════════════════════════════════════════ */
#win-nibbles {
  width: 100%;
  background: #faf6ff;
  border: 2px solid var(--lavender-2);
  box-shadow: 4px 4px 0 var(--lavender-2);
}
#win-nibbles .titlebar { background: var(--lavender); }
#win-nibbles .win-title { color: #6b3fa0; font-size: 5px; }

.err-box {
  background: #fff0fa;
  border: 1.5px solid var(--lavender-2);
  border-radius: 7px;
  padding: 10px 12px;
  text-align: center;
}
.err-hd    { font-size: 6px; color: var(--berry); margin-bottom: 6px; }
.err-count { font-size: 13px; color: #6b3fa0; margin-bottom: 4px; }
.err-sub   { font-size: 5px; color: #9b5fa5; line-height: 1.8; margin-bottom: 8px; }
.err-btns  { display: flex; gap: 7px; justify-content: center; }
.err-btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 5px;
  padding: 5px 9px;
  border: 1.5px solid var(--lavender-2);
  border-radius: 3px;
  cursor: pointer;
  background: var(--lavender);
  color: #6b3fa0;
}
.err-btn.ghost { background: #faf6ff; color: #9b5fa5; }

/* ═══════════════════════════════════════════════
   KAWAII CHARACTERS (outer viewport edges)
   ═══════════════════════════════════════════════ */
.k-char {
  position: absolute;
  z-index: 15;
  pointer-events: none;
}
.k-char img {
  height: auto;
  filter: drop-shadow(0 3px 8px rgba(196,82,122,.18));
}

#kc-cloudclock { left: 11%; top: 12%; animation: float3 8s   ease-in-out infinite; }
#kc-cloudclock img { width: 66px; }

#kc-plantpot   { left: 11%; top: 40%; animation: float2 6s   ease-in-out infinite; }
#kc-plantpot img { width: 62px; }

#kc-moon       { left: 11%; top: 65%; animation: float  7s   ease-in-out infinite; }
#kc-moon img   { width: 62px; }

#kc-blob       { right: 11%; top: 12%; animation: float2 7s   ease-in-out infinite; }
#kc-blob img   { width: 56px; }

#kc-notebook   { right: 11%; top: 40%; animation: float3 5.5s ease-in-out infinite; }
#kc-notebook img { width: 66px; }

#kc-toast      { right: 11%; top: 65%; animation: float2 6.5s ease-in-out infinite; }
#kc-toast img  { width: 66px; }

/* ═══════════════════════════════════════════════
   ANIMATIONS
   ═══════════════════════════════════════════════ */
@keyframes float  { 0%,100%{transform:translateY(0)}         50%{transform:translateY(-7px)} }
@keyframes float2 { 0%,100%{transform:translateY(0) rotate(-2deg)} 50%{transform:translateY(-5px) rotate(2deg)} }
@keyframes float3 { 0%,100%{transform:translateY(0) rotate(1deg)}  50%{transform:translateY(-6px) rotate(-1deg)} }
</style>
</head>

<!-- ══ DESKTOP GRID ══ -->
<div id="grid">

  <!-- ── LEFT PANEL ── -->
  <div id="left-panel">

    <!-- Search bar -->
    <div id="win-search">
      <form id="search-form" autocomplete="off">
        <input id="search-input" type="text" placeholder="search the web..." spellcheck="false">
        <button type="submit" id="search-btn">go →</button>
      </form>
    </div>

    <!-- Shortcuts -->
    <div id="shortcuts-row">
      <!-- shortcut circles injected by JS -->
    </div>

    <!-- Recent tabs -->
    <div id="win-tabs" class="win">
      <div class="titlebar">
        <span class="dot dot-r"></span><span class="dot dot-y"></span><span class="dot dot-g"></span>
        <span class="win-title">tabs.sys</span>
      </div>
      <div id="tabs-list">
        <!-- .tab-item items injected by JS -->
      </div>
    </div>

  </div>

  <!-- ── RIGHT PANEL ── -->
  <div id="right-panel">

    <!-- Cookie mascot + Nibble card -->
    <div id="center">
      <div id="cookie-mascot">
        <img id="cookie-img" src="" alt="today's nibble cookie">
      </div>
      <div id="main" class="win">
        <div class="titlebar">
          <span class="dot dot-r"></span>
          <span class="dot dot-y"></span>
          <span class="dot dot-g"></span>
          <span class="win-title">nibble.exe</span>
        </div>
        <div class="main-body">
          <span class="author-pill" id="author-label"></span>
          <p class="article-date" id="article-date"></p>
          <h1 class="article-title" id="article-title"></h1>
          <p class="article-desc" id="article-desc"></p>
          <button class="nibble-btn" id="nibble-btn">Nibble</button>
        </div>
      </div>
    </div>

    <!-- Blooms garden -->
    <div id="win-blooms" class="win">
      <div class="titlebar">
        <span class="dot dot-r"></span><span class="dot dot-y"></span><span class="dot dot-g"></span>
        <span class="win-title">BLOOMS.SYS</span>
      </div>
      <div class="bg-body">
        <p class="blooms-label">✿ today's garden ✿</p>
        <div class="blooms-row" id="blooms-flowers"></div>
      </div>
    </div>

    <!-- Nibbles counter -->
    <div id="win-nibbles" class="win">
      <div class="titlebar">
        <span class="dot dot-r"></span><span class="dot dot-y"></span><span class="dot dot-g"></span>
        <span class="win-title">TOO_MANY_NIBBLES.EXE</span>
      </div>
      <div class="bg-body">
        <div class="err-box">
          <div class="err-hd">⚠ BACKLOG OVERFLOW</div>
          <div class="err-count" id="unread-count">0 unread</div>
          <div class="err-sub">dangerously uncurious ♡</div>
          <div class="err-btns">
            <button class="err-btn" id="btn-read-one">read one</button>
            <button class="err-btn ghost" id="btn-ignore">ignore</button>
          </div>
        </div>
      </div>
    </div>

  </div>

</div>

<script src="newtab.js"></script>
</body>

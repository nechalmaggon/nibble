/* ═══════════════════════════════════════════════
   BASE
   ═══════════════════════════════════════════════ */
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; }

body {
  font-family: 'Press Start 2P', monospace;
  background: var(--page-bg);
  background-image:
    linear-gradient(var(--page-grid-color) 1px, transparent 1px),
    linear-gradient(90deg, var(--page-grid-color) 1px, transparent 1px);
  background-size: var(--grid-size) var(--grid-size);
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ═══════════════════════════════════════════════
   WINDOW CHROME
   ═══════════════════════════════════════════════ */
.win {
  border-radius: 12px;
  overflow: hidden;
}
.titlebar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 9px 13px;
}
.dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
.dot-r { background: var(--dot-red); }
.dot-y { background: var(--dot-yellow); }
.dot-g { background: var(--dot-green); }
.win-title { margin-left: 7px; font-size: 7px; letter-spacing: -.2px; }
.bg-body { padding: 12px 14px 14px; }

/* ═══════════════════════════════════════════════
   MAIN GRID — vertical, centred
   ═══════════════════════════════════════════════ */
#grid {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 32px;
  position: relative;
  z-index: 20;
}

/* ═══════════════════════════════════════════════
   PAGE HEADING
   ═══════════════════════════════════════════════ */
#page-heading {
  font-size: 14px;
  color: var(--heading-color);
  letter-spacing: 3px;
  text-align: center;
  white-space: nowrap;
}

/* ═══════════════════════════════════════════════
   MIDDLE ROW — tabs | nibble card | blooms
   ═══════════════════════════════════════════════ */
#middle-row {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 32px;
}

/* ═══════════════════════════════════════════════
   TABS.SYS (left side panel)
   ═══════════════════════════════════════════════ */
#win-tabs {
  width: 200px;
  background: var(--tabs-bg);
  border: 2px solid var(--tabs-accent);
  box-shadow: 4px 4px 0 var(--tabs-accent);
}
#win-tabs .titlebar { background: var(--tabs-accent); }
#win-tabs .win-title { color: var(--tabs-text); }

#tabs-list {
  padding: 8px 12px 12px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.tab-item {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 7px 8px;
  text-decoration: none;
  border-radius: 7px;
  cursor: pointer;
}
.tab-item:hover { background: var(--tab-hover-bg); }
.tab-favicon {
  width: 14px;
  height: 14px;
  flex-shrink: 0;
  border-radius: 3px;
}
.tab-title {
  font-size: 8px;
  color: var(--text-primary);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.tabs-empty {
  font-size: 8px;
  color: var(--tabs-text);
  text-align: center;
  padding: 10px 0 4px;
}

/* ═══════════════════════════════════════════════
   NIBBLE CARD + COOKIE MASCOT (centre)
   ═══════════════════════════════════════════════ */
#center {
  display: flex;
  flex-direction: column;
  align-items: center;
}

#cookie-mascot {
  text-align: center;
  margin-bottom: -20px;
  position: relative;
  z-index: 25;
}
#cookie-mascot img {
  width: 80px;
  height: auto;
  filter: drop-shadow(0 4px 10px var(--mascot-shadow));
}

#main {
  position: relative;
  width: 510px;
  max-height: 480px;
  background: var(--surface-bg);
  border: 2.5px solid var(--accent);
  box-shadow: 7px 7px 0 var(--accent), 0 28px 80px var(--card-ambient-shadow);
  border-radius: 14px;
  overflow: hidden;
  animation: float 5s ease-in-out infinite;
}
#main .titlebar { background: var(--titlebar-bg); }
#main .win-title { color: var(--accent-dark); }

.main-body {
  padding: 30px 44px 34px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
}

.author-pill {
  border: 2px solid var(--soft-border);
  color: var(--accent);
  padding: 9px 16px;
  border-radius: 999px;
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  white-space: nowrap;
}
.author-pill.hidden { display: none; }

.article-date {
  font-size: 9px;
  color: var(--article-date-color);
  letter-spacing: 0.04em;
}
.article-date.hidden { display: none; }

.article-title {
  font-size: 13px;
  color: var(--text-primary);
  text-align: center;
  line-height: 1.85;
}

.article-desc {
  font-size: 9px;
  color: var(--article-desc-color);
  line-height: 2.1;
  text-align: center;
  width: 100%;
  max-width: 360px;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.article-desc.hidden { display: none; }

.nibble-btn {
  background: var(--accent);
  color: var(--btn-text);
  border: 2.5px solid var(--accent-dark);
  box-shadow: 4px 4px 0 var(--accent-dark);
  padding: 14px 44px;
  border-radius: 999px;
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  letter-spacing: 1px;
  cursor: pointer;
  margin-top: 4px;
  transition: transform .1s, box-shadow .1s;
}
.nibble-btn:hover {
  transform: translate(2px, 2px);
  box-shadow: 2px 2px 0 var(--accent-dark);
}

/* ═══════════════════════════════════════════════
   BLOOMS.SYS (right side panel)
   ═══════════════════════════════════════════════ */
#win-blooms {
  width: 200px;
  background: var(--blooms-bg);
  border: 2px solid var(--blooms-border);
  box-shadow: 4px 4px 0 var(--blooms-border);
}
#win-blooms .titlebar { background: var(--blooms-titlebar-bg); }
#win-blooms .win-title { color: var(--blooms-text); }
.blooms-label { font-size: 7px; color: var(--blooms-text); text-align: center; margin-bottom: 8px; }
.blooms-row { display: flex; justify-content: center; align-items: center; flex-wrap: wrap; gap: 6px; }

/* ═══════════════════════════════════════════════
   SHORTCUTS — two rows below nibble card
   ═══════════════════════════════════════════════ */
#shortcuts-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}

#shortcuts-row-1,
#shortcuts-row-2 {
  display: flex;
  flex-direction: row;
  gap: 20px;
  justify-content: center;
}

.shortcut-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 9px;
  text-decoration: none;
  cursor: pointer;
  background: none;
  border: none;
  font-family: 'Press Start 2P', monospace;
  padding: 0;
}
.shortcut-circle {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: var(--surface-bg);
  border: 2px solid var(--soft-border);
  box-shadow: 3px 3px 0 var(--soft-border);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.1s, box-shadow 0.1s;
}
.shortcut-item:hover .shortcut-circle {
  transform: translate(1px, 1px);
  box-shadow: 2px 2px 0 var(--soft-border);
}
.shortcut-circle img {
  width: 22px;
  height: 22px;
  border-radius: 4px;
}
.shortcut-label {
  font-size: 9px;
  color: var(--text-primary);
  text-align: center;
  max-width: 100px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* "More" circle — lavender */
.shortcut-more {
  position: relative;
}
.shortcut-more .shortcut-circle {
  background: var(--more-btn-bg);
  border-color: var(--more-btn-border);
  box-shadow: 3px 3px 0 var(--more-btn-border);
  font-size: 13px;
  color: var(--more-btn-color);
  letter-spacing: 1px;
}
.shortcut-more:hover .shortcut-circle { box-shadow: 2px 2px 0 var(--more-btn-border); }
.shortcut-more.open .shortcut-circle {
  transform: translate(1px, 1px);
  box-shadow: 2px 2px 0 var(--more-btn-border);
}

/* More dropdown popup */
#more-popup {
  display: none;
  position: absolute;
  bottom: calc(100% + 12px);
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  background: var(--page-bg);
  border: 1.5px solid var(--popup-border);
  box-shadow: 0 6px 24px var(--popup-shadow);
  border-radius: 18px;
  min-width: 200px;
}
#more-popup.open { display: block; }
#more-popup-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px 24px;
  padding: 16px 18px;
  justify-items: center;
  max-height: calc(2 * (52px + 18px + 20px));
  overflow-y: auto;
}

/* "Add" circle — yellow */
.shortcut-add .shortcut-circle {
  background: var(--add-btn-bg);
  border-color: var(--add-btn-border);
  box-shadow: 3px 3px 0 var(--add-btn-border);
  font-size: 20px;
  color: var(--add-btn-color);
}
.shortcut-add:hover .shortcut-circle { box-shadow: 2px 2px 0 var(--add-btn-border); }

/* ═══════════════════════════════════════════════
   KAWAII CHARACTERS
   ═══════════════════════════════════════════════ */
.k-char {
  position: absolute;
  z-index: 15;
  pointer-events: none;
}
.k-char img {
  height: auto;
  filter: drop-shadow(0 3px 8px var(--char-shadow));
}

#kc-cloudclock { left: 11%; top: 12%; animation: float3 8s   ease-in-out infinite; }
#kc-cloudclock img { width: 66px; }
#kc-plantpot   { left: 11%; top: 40%; animation: float2 6s   ease-in-out infinite; }
#kc-plantpot img { width: 62px; }
#kc-moon       { left: 11%; top: 65%; animation: float  7s   ease-in-out infinite; }
#kc-moon img   { width: 62px; }
#kc-blob       { right: 11%; top: 12%; animation: float2 7s   ease-in-out infinite; }
#kc-blob img   { width: 56px; }
#kc-notebook   { right: 11%; top: 40%; animation: float3 5.5s ease-in-out infinite; }
#kc-notebook img { width: 66px; }
#kc-toast      { right: 11%; top: 65%; animation: float2 6.5s ease-in-out infinite; }
#kc-toast img  { width: 66px; }

/* ═══════════════════════════════════════════════
   ANIMATIONS
   ═══════════════════════════════════════════════ */
@keyframes float  { 0%,100%{transform:translateY(0)}         50%{transform:translateY(-7px)} }
@keyframes float2 { 0%,100%{transform:translateY(0) rotate(-2deg)} 50%{transform:translateY(-5px) rotate(2deg)} }
@keyframes float3 { 0%,100%{transform:translateY(0) rotate(1deg)}  50%{transform:translateY(-6px) rotate(-1deg)} }

/* ═══════════════════════════════════════════════
   ADD SHORTCUT MODAL
   ═══════════════════════════════════════════════ */
#shortcut-modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--modal-overlay-bg);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
#shortcut-modal-overlay.open { display: flex; }

#shortcut-modal {
  width: 340px;
  background: var(--surface-bg);
  border: 2.5px solid var(--accent);
  box-shadow: 0 8px 32px var(--modal-overlay-bg);
  border-radius: 14px;
  overflow: hidden;
  font-family: 'Press Start 2P', monospace;
}
#shortcut-modal .titlebar { background: var(--titlebar-bg); }
#shortcut-modal .win-title { color: var(--accent-dark); }

#shortcut-modal-body {
  padding: 24px 28px 28px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.modal-field {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.modal-field label {
  font-size: 9px;
  color: var(--accent);
  letter-spacing: .5px;
}
.modal-field input {
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  color: var(--text-primary);
  border: 2px solid var(--soft-border);
  border-radius: 8px;
  padding: 10px 12px;
  outline: none;
  background: var(--page-bg);
  transition: border-color .15s;
}
.modal-field input:focus { border-color: var(--accent); }

#modal-error {
  font-size: 7px;
  color: var(--error-color);
  min-height: 12px;
  letter-spacing: .3px;
}

#modal-save-btn {
  background: var(--accent);
  color: var(--btn-text);
  border: 2.5px solid var(--accent-dark);
  box-shadow: 4px 4px 0 var(--accent-dark);
  padding: 12px 24px;
  border-radius: 999px;
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  letter-spacing: 1px;
  cursor: pointer;
  align-self: center;
  margin-top: 4px;
  transition: transform .1s, box-shadow .1s;
}
#modal-save-btn:hover {
  transform: translate(2px, 2px);
  box-shadow: 2px 2px 0 var(--accent-dark);
}

/* ─── Theme Switcher ──────────────────────────────────────────────────────── */
#theme-switcher {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 300;
}

#theme-toggle-btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  padding: 8px 14px;
  background: var(--surface-bg);
  border: 1px solid var(--soft-border);
  border-radius: 999px;
  color: var(--text-primary);
  cursor: pointer;
  box-shadow: 0 4px 16px var(--card-ambient-shadow);
  white-space: nowrap;
}

#theme-panel {
  display: none;
  position: absolute;
  bottom: calc(100% + 10px);
  right: 0;
  background: var(--surface-bg);
  border: 1px solid var(--soft-border);
  border-radius: 12px;
  box-shadow: 0 4px 16px var(--card-ambient-shadow);
  padding: 6px;
  min-width: 200px;
}
#theme-panel.open { display: block; }

.theme-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: 8px;
  cursor: pointer;
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  color: var(--text-primary);
}
.theme-row:hover { background: var(--page-grid-color); }

.swatch-cluster {
  display: flex;
  flex-shrink: 0;
}
.swatch-cluster span {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  display: block;
  border: 1px solid rgba(0,0,0,.08);
}
.swatch-cluster span + span { margin-left: -4px; }

.theme-name { flex: 1; }

.theme-check {
  color: var(--accent);
  font-size: 10px;
  visibility: hidden;
}
.theme-row.active .theme-check { visibility: visible; }
</style>
</head>
<body>

<!-- ══ DECORATION SVG LAYER ══ -->
<div id="deco-layer"></div>

<!-- ══ KAWAII CHARACTERS ══ -->
<div id="kc-cloudclock" class="k-char"><img src="assets/characters/char_cloudclock.png" alt=""></div>
<div id="kc-plantpot"   class="k-char"><img src="assets/characters/char_plantpot.png"   alt=""></div>
<div id="kc-moon"       class="k-char"><img src="assets/characters/char_moon.png"        alt=""></div>
<div id="kc-blob"       class="k-char"><img src="assets/characters/char_blob.png"        alt=""></div>
<div id="kc-notebook"   class="k-char"><img src="assets/characters/char_notebook.png"    alt=""></div>
<div id="kc-toast"      class="k-char"><img src="assets/characters/char_toast.png"       alt=""></div>

<!-- ══ MAIN GRID ══ -->
<div id="grid">

  <p id="page-heading">your nibble for the day</p>

  <!-- ── MIDDLE ROW ── -->
  <div id="middle-row">

    <div id="win-tabs" class="win">
      <div class="titlebar">
        <span class="dot dot-r"></span><span class="dot dot-y"></span><span class="dot dot-g"></span>
        <span class="win-title">continue.tabs.sys</span>
      </div>
      <div id="tabs-list"></div>
    </div>

    <div id="center">
      <div id="cookie-mascot">
        <img id="cookie-img" src="" alt="today's nibble cookie">
      </div>
      <div id="main" class="win">
        <div class="titlebar">
          <span class="dot dot-r"></span>
          <span class="dot dot-y"></span>
          <span class="dot dot-g"></span>
          <span class="win-title">nibble.exe</span>
        </div>
        <div class="main-body">
          <span class="author-pill" id="author-label"></span>
          <p class="article-date" id="article-date"></p>
          <h1 class="article-title" id="article-title"></h1>
          <p class="article-desc" id="article-desc"></p>
          <button class="nibble-btn" id="nibble-btn">Nibble</button>
        </div>
      </div>
    </div>

    <div id="win-blooms" class="win">
      <div class="titlebar">
        <span class="dot dot-r"></span><span class="dot dot-y"></span><span class="dot dot-g"></span>
        <span class="win-title">BLOOMS.SYS</span>
      </div>
      <div class="bg-body">
        <p class="blooms-label">✿ nibble daily to nourish ✿</p>
        <div class="blooms-row" id="blooms-flowers"></div>
      </div>
    </div>

  </div>

  <!-- ── SHORTCUTS ── -->
  <div id="shortcuts-area">
    <div id="shortcuts-row-1"></div>
    <div id="shortcuts-row-2"></div>
  </div>

</div>

<!-- ══ ADD SHORTCUT MODAL ══ -->
<div id="shortcut-modal-overlay">
  <div id="shortcut-modal" class="win" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="titlebar">
      <div class="dot dot-r" id="modal-close-dot" style="cursor:pointer"></div>
      <div class="dot dot-y"></div>
      <div class="dot dot-g"></div>
      <span class="win-title" id="modal-title">add.shortcut</span>
    </div>
    <div id="shortcut-modal-body">
      <div class="modal-field">
        <label for="modal-name-input">name</label>
        <input id="modal-name-input" type="text" placeholder="e.g. GitHub" maxlength="40" autocomplete="off">
      </div>
      <div class="modal-field">
        <label for="modal-url-input">url</label>
        <input id="modal-url-input" type="url" placeholder="https://..." maxlength="500" autocomplete="off">
      </div>
      <div id="modal-error"></div>
      <button id="modal-save-btn">save</button>
    </div>
  </div>
</div>

<!-- ══ THEME SWITCHER ══ -->
<div id="theme-switcher">
  <div id="theme-panel">
    <div class="theme-row" data-theme-key="default">
      <div class="swatch-cluster">
        <span style="background:#FFF8FA"></span>
        <span style="background:#FFB6C1"></span>
        <span style="background:#C4527A"></span>
      </div>
      <span class="theme-name">cherry blossom</span>
      <span class="theme-check">✓</span>
    </div>
    <div class="theme-row" data-theme-key="matcha">
      <div class="swatch-cluster">
        <span style="background:#F4FAF6"></span>
        <span style="background:#A8C5A0"></span>
        <span style="background:#3D6B4F"></span>
      </div>
      <span class="theme-name">matcha</span>
      <span class="theme-check">✓</span>
    </div>
    <div class="theme-row" data-theme-key="oceandrift">
      <div class="swatch-cluster">
        <span style="background:#EDF6F9"></span>
        <span style="background:#83C5BE"></span>
        <span style="background:#006D77"></span>
      </div>
      <span class="theme-name">ocean drift</span>
      <span class="theme-check">✓</span>
    </div>
    <div class="theme-row" data-theme-key="inkrose">
      <div class="swatch-cluster">
        <span style="background:#1C1014"></span>
        <span style="background:#8B3A56"></span>
        <span style="background:#E8759A"></span>
      </div>
      <span class="theme-name">ink &amp; rose</span>
      <span class="theme-check">✓</span>
    </div>
    <div class="theme-row" data-theme-key="oatlatte">
      <div class="swatch-cluster">
        <span style="background:#FBF7F1"></span>
        <span style="background:#E8D6C3"></span>
        <span style="background:#8B5E3C"></span>
      </div>
      <span class="theme-name">oat latte</span>
      <span class="theme-check">✓</span>
    </div>
    <div class="theme-row" data-theme-key="midnightmono">
      <div class="swatch-cluster">
        <span style="background:#0D0D0F"></span>
        <span style="background:#232327"></span>
        <span style="background:#6E6E73"></span>
      </div>
      <span class="theme-name">midnight mono</span>
      <span class="theme-check">✓</span>
    </div>
  </div>
  <button id="theme-toggle-btn">✦ set the vibe ✦</button>
</div>

<script src="newtab.js"></script>
</body>
</html>
